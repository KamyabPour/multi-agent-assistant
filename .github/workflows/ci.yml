name: CI

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main, dev, staging]

jobs:
  promotion-policy:
    name: Promotion Policy
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch promotion order
        shell: bash
        run: |
          echo "event=${{ github.event_name }}"
          echo "head=${{ github.head_ref }}"
          echo "base=${{ github.base_ref }}"

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Push build detected; promotion policy only applies to PRs."
            exit 0
          fi

          if [ "${{ github.base_ref }}" = "dev" ]; then
            if [ "${{ github.head_ref }}" = "staging" ] || [ "${{ github.head_ref }}" = "main" ]; then
              echo "PRs into dev must come from a feature/task branch, not from staging or main."
              exit 1
            fi
          fi

          if [ "${{ github.base_ref }}" = "staging" ] && [ "${{ github.head_ref }}" != "dev" ]; then
            echo "PRs into staging must come from dev after dev checks pass."
            exit 1
          fi

          if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "staging" ]; then
            echo "PRs into main must come from staging after staging checks pass."
            exit 1
          fi

          echo "Promotion policy passed."

  backend-tests:
    name: Backend Tests (FastAPI)
    runs-on: ubuntu-latest
    needs: promotion-policy

    defaults:
      run:
        working-directory: services/orchestrator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest httpx

      - name: Run tests
        run: pytest -q

  web-build:
    name: Web Build (Next.js)
    runs-on: ubuntu-latest
    needs: promotion-policy

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
